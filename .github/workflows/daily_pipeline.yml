# ================================================================
# Daily Calmdromeda Pipeline
# ================================================================
# [변경 이력]
# 2026.03.29 최초 작성
# 2026.03.30 브랜치명 main → master 수정
# 2026.03.30 timeout 2시간 → 6시간
# 2026.03.30 dotenv 추가, checkout 충돌 해결
# 2026.03.31 thumbnails/, pipeline.log, metadata.json 저장(Artifacts 섹션에서 다운로드 가능. 30일후 삭제)
# 2026.04.04 feat: used_assets 신규 세션 quality=pending 기본값 설정
# 2026.04.07 결과물 Google Drive 저장 로직 추가
# 2026.04.08 feat: CI 테스트 추가 (Actions 사전체크, 로컬 전체)
# ================================================================


name: Daily Calmdromeda Pipeline

on:
  schedule:
    # 매일 오전 9시 KST (= UTC 00:00) 실행
    # 영상 제작 후 YouTube 익일 오후 6시 30분 KST 예약 공개
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행 버튼 (테스트용)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    #timeout-minutes: 120  # 최대 2시간 (1시간 영상 제작 기준)
    timeout-minutes: 360  # 최대 6시간

    steps:
      # ── 1. 코드 체크아웃 (main 브랜치) ──────────────────────────────
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master

      # ── 2. data 브랜치에서 암호화 파일 가져오기 ─────────────────────
      - name: Fetch encrypted data files
        run: |
          git fetch origin data 2>/dev/null || echo "data 브랜치 없음 — 첫 실행"
          if git show origin/data:used_assets.json.enc > used_assets.json.enc 2>/dev/null; then
            echo "used_assets.json.enc 복원됨"
          else
            echo "used_assets.json.enc 없음 — 새로 시작"
          fi
          if git show origin/data:history.txt.enc > history.txt.enc 2>/dev/null; then
            echo "history.txt.enc 복원됨"
          else
            echo "history.txt.enc 없음"
          fi

      # ── 3. 암호화 파일 복호화 ────────────────────────────────────────
      - name: Decrypt data files
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          pip install cryptography python-dotenv --quiet
          if [ -f used_assets.json.enc ]; then
            python crypto_utils.py --decrypt used_assets.json.enc
          fi
          if [ -f history.txt.enc ]; then
            python crypto_utils.py --decrypt history.txt.enc
          fi

      # ── 4. Python 환경 설정 ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. FFmpeg 설치 ───────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      # ── 6. rclone 설치 및 Google Drive 설정 ─────────────────────────
      - name: Install and configure rclone
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone

          # RCLONE_CONF 시크릿 존재 여부 확인
          if [ -z "$RCLONE_CONF" ]; then
            echo "::error::RCLONE_CONF 시크릿이 비어 있습니다. GitHub Secrets에 rclone.conf 내용을 등록하세요."
            exit 1
          fi

          echo "$RCLONE_CONF" > ~/.config/rclone/rclone.conf

          # [gdrive] 섹션 포함 여부 검증
          if ! rclone listremotes | grep -q "^gdrive:"; then
            echo "::error::rclone.conf에 'gdrive' 리모트가 없습니다. RCLONE_CONF 값에 [gdrive] 섹션이 포함되어 있는지 확인하세요."
            echo "--- 현재 등록된 리모트 ---"
            rclone listremotes
            exit 1
          fi

          echo "rclone 설정 완료 — gdrive 리모트 확인됨"
          rclone listremotes

      # ── 7. 자격증명 복원 ─────────────────────────────────────────────
      - name: Restore credentials
        env:
          YOUTUBE_TOKEN_JSON:        ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
        run: |
          mkdir -p credentials
          echo "$YOUTUBE_TOKEN_JSON"        > credentials/token.json
          echo "$GOOGLE_CLIENT_SECRET_JSON" > credentials/client_secret.json

      # ── 8. 사전 체크 (Preflight) ────────────────────────────────────
      - name: Preflight checks
        env:
          FREESOUND_API_KEY:          ${{ secrets.FREESOUND_API_KEY }}
          PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          ENCRYPTION_KEY:             ${{ secrets.ENCRYPTION_KEY }}
          YOUTUBE_TOKEN:              "credentials/token.json"
        run: |
          pytest tests/test_pipeline.py -v -k "Preflight" --tb=short
          echo "사전 체크 완료"

      # ── 9. 파이프라인 실행 ───────────────────────────────────────────
      - name: Run pipeline
        env:
          FREESOUND_API_KEY:          ${{ secrets.FREESOUND_API_KEY }}
          PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          ENCRYPTION_KEY:             ${{ secrets.ENCRYPTION_KEY }}
          UPLOAD_ENABLED:             "true"
          UPLOAD_HOUR_KST:            "18"
          UPLOAD_MINUTE_KST:          "30"
          YOUTUBE_TOKEN:              "credentials/token.json"
          YOUTUBE_CLIENT_SECRET:      "credentials/client_secret.json"
          INSTAGRAM_ENABLED:          "true"
          INSTAGRAM_ACCESS_TOKEN:     ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:          ${{ secrets.INSTAGRAM_USER_ID }}
          IMGBB_API_KEY:              ${{ secrets.IMGBB_API_KEY }}
        run: python pipeline.py

      # ── 10. 실행 후 암호화 & data 브랜치에 커밋 ──────────────────────
      - name: Encrypt and commit data files
        if: always()  # 파이프라인 실패해도 데이터 저장
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          if [ -f used_assets.json ]; then
            python crypto_utils.py --encrypt used_assets.json
            cp used_assets.json.enc /tmp/used_assets.json.enc
          fi
          if [ -f history.txt ]; then
            python crypto_utils.py --encrypt history.txt
            cp history.txt.enc /tmp/history.txt.enc
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # data 브랜치 체크아웃 (없으면 고아 브랜치로 생성)
          git fetch origin data 2>/dev/null || true
          # checkout 전 .enc 파일 제거 (충돌 방지)
          rm -f used_assets.json.enc history.txt.enc
          if git ls-remote --heads origin data | grep -q data; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
            git rm -rf . --quiet 2>/dev/null || true
          fi
          # 새로 암호화한 파일 복사
          [ -f /tmp/used_assets.json.enc ] && cp /tmp/used_assets.json.enc used_assets.json.enc
          [ -f /tmp/history.txt.enc ] && cp /tmp/history.txt.enc history.txt.enc

          [ -f used_assets.json.enc ] && git add used_assets.json.enc
          [ -f history.txt.enc ]     && git add history.txt.enc
          [ -f blacklist.json ]      && git add blacklist.json

          TODAY=$(date -u '+%Y-%m-%d %H:%M UTC')
          git diff --cached --quiet || git commit -m "data: ${TODAY}"
          git push origin data

      # ── 9. 썸네일/로그 Artifacts 저장 ───────────────────────────────
      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: |
            output/**/thumbnails/
            output/**/pipeline.log
            output/**/metadata.json
          retention-days: 30  # 30일 보관
          if-no-files-found: warn

      # ── 11. 민감 파일 정리 ───────────────────────────────────────────
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -rf output/
          rm -f credentials/token.json credentials/client_secret.json
          rm -f used_assets.json history.txt
          echo "정리 완료"